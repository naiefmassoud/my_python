name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and analyze
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Validate SonarQube endpoint
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          set -euo pipefail
          if [[ -z "${SONAR_HOST_URL:-}" ]]; then
            echo "SONAR_HOST_URL is empty. Set the repository secret SONAR_HOST_URL to your SonarQube base URL."
            exit 1
          fi

          case "$SONAR_HOST_URL" in
            *"/dashboard"*|*"/projects"*|*"/project"*|*"/sessions"*|*"/login"*)
              echo "SONAR_HOST_URL appears to be a UI page URL: $SONAR_HOST_URL"
              echo "Set SONAR_HOST_URL to the SonarQube base URL only (for example: https://sonarqube.example.com)."
              exit 1
              ;;
          esac

          base_url="${SONAR_HOST_URL%/}"
          response_file="$(mktemp)"
          http_code="$(curl -sS -o "$response_file" -w "%{http_code}" "$base_url/api/server/version")"

          if [[ "$http_code" != "200" ]]; then
            echo "Unable to reach SonarQube API at $base_url/api/server/version (HTTP $http_code)."
            echo "Check SONAR_HOST_URL and any network/proxy rules."
            exit 1
          fi

          if grep -qi "<!doctype html" "$response_file"; then
            echo "SonarQube API check returned HTML, not API response."
            echo "SONAR_HOST_URL likely points to a web UI path or redirect endpoint."
            echo "Use the SonarQube base URL only."
            exit 1
          fi

          echo "SonarQube endpoint is reachable."
      - uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      # If you wish to fail your job when the Quality Gate is red, uncomment the
      # following lines. This would typically be used to fail a deployment.
      # - uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
      #   timeout-minutes: 5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      